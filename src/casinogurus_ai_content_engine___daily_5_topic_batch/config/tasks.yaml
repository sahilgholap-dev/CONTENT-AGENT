---
discover_daily_casino_topics:
  description: |-
    Discover exactly 1 unique {domain_noun} content topic for today's content production batch. Determine today's date, month, and year automatically; do not rely on any input variable for this.

    VOICE & BRAND CONTEXT:
    {voice_store}{client_directives}

    {topic_discovery_playbook}
  expected_output: |-
    A JSON object with exactly 1 topic entry:
    {
      "batch_date": "YYYY-MM-DD",
      "topics": [
        {
          "topic": str,
          "primary_keyword": str,
          "pillar": {pillar_enum},
          "search_intent": "informational"|"commercial"|"transactional",
          "freshness_rationale": str,
          "uniqueness_confirmed": bool,
          "estimated_commercial_value": "high"|"medium"|"low"
        }
      ],
      "pillars_covered": [str],
      "discovery_notes": str
    }
  agent: casino_content_topic_discovery_specialist
keyword_research_and_competitor_analysis:
  description: |-
    Perform Layer A research and grounding for the 1 topic discovered in the Discover Daily {domain_title} Topics task.

    Read the topic discovery output and extract the 1 topic. Then for EACH topic, complete all 4 steps below sequentially. Label each output block clearly with the topic name.

    REPEAT THE FOLLOWING FOR EACH OF THE 1 topic:

    STEP 1 — KEYWORD RESEARCH
    Search the web for {keyword_domain} keyword opportunities related to this topic. Score each candidate keyword on all seven dimensions:
    - Relevance (fit to {client_name} pillars: {pillar_slash_list})
    - Volume signal (apparent search demand)
    - Difficulty signal (authority of pages currently ranking)
    - Search intent (informational / commercial / transactional / regional)
    - Business value (affiliate / comparison / signup potential)
    - Seasonality (time sensitivity, year-based, event-based)
    - Compliance risk ({compliance_risk_hint})
    Weight the scoring toward business value (commercial/affiliate intent) and durable, evergreen US player search demand; treat seasonality/freshness as a minor tie-breaker only.

    STEP 2 — COMPETITOR ANALYSIS
    Browse the live SERP for the selected primary keyword. {competitor_refs}
    Capture: title, H2 structure, approximate word count, FAQs present, internal-link pattern, bonus details, entities covered.
    Summarise structure and gaps — NEVER copy prose. Every competitor claim is to verify, not fact.

    STEP 3 — SEO BRIEF
    Produce the full SEO Brief containing:
    - Primary keyword + secondary/semantic keywords
    - Confirmed search intent and reader persona
    - Full outline (H2/H3) engineered to beat competitor gaps
    - Target word count and title options + meta description options
    - FAQ set (question + intended answer angle) — exactly 6 FAQ questions
    - Internal-link candidates from {client_name}
    - External source notes and schema recommendation
    - Per-article compliance checklist

    STEP 4 — FACT STORE
    Assemble the per-article Fact Store: source-tagged, confidence-labelled verified facts only. Each entry: fact text, source URL, confidence label (verified/inferred/unverified). Bonus figures, licensing, payout speed, and legality go in ONLY if traced to a primary source; otherwise flag for human check.
  expected_output: |-
    A JSON array containing exactly 1 research object:
    [
      {
        "topic": str,
        "pillar": str,
        "SEO_BRIEF": {
          "primary_keyword": str,
          "secondary_keywords": [str],
          "search_intent": str,
          "reader_persona": str,
          "outline": [{"h2": str, "h3s": [str]}],
          "word_count_target": int,
          "title_options": [str],
          "meta_description_options": [str],
          "faq_set": [{"question": str, "answer_angle": str}],
          "internal_link_candidates": [{"anchor": str, "target_url": str}],
          "schema_recommendation": str,
          "compliance_checklist": [{"item": str, "required": bool}],
          "competitor_gaps": [str],
          "keyword_scores": {"relevance": str, "volume_signal": str, "difficulty_signal": str, "search_intent": str, "business_value": str, "seasonality": str, "compliance_risk": str},
          "selection_rationale": str
        },
        "FACT_STORE": {
          "topic": str,
          "facts": [{"fact": str, "source_url": str, "confidence": "verified"|"inferred"|"unverified", "flag_for_human": bool}]
        }
      }
    ]
  agent: casino_seo_research_grounding_specialist
  context:
  - discover_daily_casino_topics
draft_casino_article:
  description: |-
    Write full {domain_noun} article drafts for the 1 topic from the research task.

    Read the research output (array of 1 topic object). For EACH topic, produce a complete draft using its SEO_BRIEF and FACT_STORE.

    VOICE STORE (tone/style only — no facts):
    {voice_store}{client_directives}

    PROCESS EACH TOPIC SEQUENTIALLY. Label each draft output with its topic.

    FOR EACH OF THE 1 topic, apply ALL rules below:

    **OUTPUT LENGTH — HARD FLOOR AND TARGET PER ARTICLE (editable values):**
    {word_count_rules}

    {content_skeletons}

    **STRUCTURAL REQUIREMENTS:**
    - Follow the SEO Brief outline EXACTLY for each topic (adapted to the content-type skeleton above)
    - Each article must have exactly 6 FAQs in <h3> tags under <h2>Frequently Asked Questions</h2>
    - Conclusion MUST be the LAST section
    - Every featured_image_prompt MUST include alt='[description]'
    - Minimum 3 internal links per article as <a href="URL">anchor text</a>
    {first_use_definitions}
    - Vary paragraph and sentence length. Mostly short and scannable, but mix in a longer explanatory sentence so the rhythm sounds human. Never make every paragraph the same length.

    {eeat_guidance}
    - NEVER leave working placeholders in reader-facing text: no literal "[source]", no citation markers, no internal notes inside body_html. Source attribution lives ONLY in source_notes; flags live ONLY as [VERIFICATION_FLAG: ...] per the flag rule; everything else internal stays out of the body.

    {self_scan_rules}

    **NO FABRICATED DATA — ABSOLUTE RULE:**
    NEVER invent fake {domain_noun} names ({domain_title} A, {domain_title} B, etc.) or per-operator figures not in the FACT_STORE.
    If no real sourced operator offers exist in FACT_STORE, use ONE of:
    - OPTION A: Omit table, add note directing to {domain_noun} reviews
    - OPTION B: Table by offer TYPE and GENERAL RANGES only (no operator names), with VERIFICATION_FLAGs on all figures
    - OPTION C: Single editor placeholder row with no figures

    **VERIFICATION FLAG RULE:**
    Flags apply ONLY to REAL FACT_STORE facts that are time-sensitive. NEVER attach flags to invented data.
    Every specific figure ($ amounts, x-wagering, spin counts) from the FACT_STORE MUST be followed immediately by [VERIFICATION_FLAG: confirm current value and T&Cs before publish].

    **MANDATORY LANGUAGE per article:**
    {mandatory_language}

    **BANNED PHRASES — never use in ANY article:**
    {banned_phrases}

    If {revision_feedback} is provided, address ONLY the specific failures listed for the relevant article.
  expected_output: |-
    A JSON array containing exactly 1 complete draft object:
    [
      {
        "topic": str,
        "draft": {
          "body_html": str,
          "seo_title": str,
          "meta_description": str,
          "slug": str,
          "category": str,
          "tags": [str],
          "excerpt": str,
          "featured_image_prompt": str,  // Must include alt='description'
          "responsible_gambling_note": str,
          "internal_links": [{"anchor": str, "target_url": str}],
          "source_notes": [{"claim": str, "fact_store_entry": str, "source_url": str, "confidence": str}],
          "verification_flags": [{"flag": str, "location_in_draft": str}]
        }
      }
    ]
  agent: casinogurus_grounded_article_drafter
  context:
  - keyword_research_and_competitor_analysis
compliance_gate_check:
  description: |-
    Run the compliance mandate gate on the 1 draft article from the Draft {domain_title} Article task.

    Read the draft array (1 topic object). For EACH draft, run the full compliance check independently. Label each scorecard with its topic.

    FOR THE 1 DRAFT, apply these checks:

    {compliance_rules}

    **OVERALL VERDICT RULE per article:**
    overall_verdict = "PASS" if blocking_failures[] is empty.
    overall_verdict = "FAIL" only if blocking_failures[] contains at least one High-severity item.
  expected_output: |-
    A JSON array containing exactly 1 compliance scorecard:
    [
      {
        "topic": str,
        "compliance_scorecard": {
          "overall_verdict": "PASS"|"FAIL",
          "checks": [...],
          "blocking_failures": [],
          "revision_instructions": []
        }
      },
      
    ]
  agent: casino_content_compliance_mandate_checker
  async_execution: true
  context:
  - draft_casino_article
seo_and_quality_gate_check:
  description: |-
    Run the SEO and quality gate on the 1 draft article from the Draft {domain_title} Article task.

    Read the draft array (1 topic object). For EACH draft, run the full SEO quality check independently. Label each scorecard with its topic.

    **AUTOMATIC-FAIL PRE-CHECKS — run BEFORE scoring the six dimensions. If either fails, overall_verdict = "FAIL" for that draft regardless of dimension scores (record the reason in revision_instructions). These do not alter the compliance gate; they apply to this SEO/quality gate only.**
    {seo_prechecks}

    FOR THE 1 DRAFT (that pass the pre-checks), score each dimension 1–10. PASS = score ≥ 7. FAIL = score < 7.

    **1. SEARCH-INTENT MATCH**
    PASS if the draft answers the reader's stated query and covers types, claiming process, and key terms.

    **2. ON-PAGE SEO**
    Check ALL of the following:
    - Primary keyword appears in seo_title → required
    - Primary keyword appears in meta_description → required
    - Primary keyword appears as a SUBSTRING (case-insensitive) in at least one <h2> tag → required
    - Structured H2/H3 hierarchy present → required
    - alt= attribute present in featured_image_prompt → required
    Score 8+ if all present. Score 6 only if keyword is genuinely absent from ALL H2 tags.

    **3. E-E-A-T SIGNALS**
    PASS if: source_notes with URLs present, responsible_gambling_note present, [VERIFICATION_FLAG] markers present (positive signals). FAIL only if source_notes are completely absent.

    **4. READABILITY**
    PASS if the writing is mostly short and scannable with varied paragraph and sentence length. A mix of short paragraphs and occasional longer explanatory ones is desirable, not a fault. FAIL only if the text is a wall of long dense paragraphs throughout, or if every paragraph is identical machine-choppy length.

    **5. INTERNAL LINKING**
    PASS if ≥2 internal links with natural anchors are present. HARD RULE: If ≥2 links present, score MUST be 7 or higher.

    **6. STRUCTURE COMPLETENESS**
    COUNT the number of <h3> tags inside the FAQ block:
    - Exactly 6 <h3> FAQ questions → score 9, verdict PASS
    - Fewer than 6 → score 5, verdict FAIL
    Also check: all outline sections present, no orphaned headings, Conclusion is the last section after FAQs.
  expected_output: |-
    A JSON array containing exactly 1 SEO scorecard:
    [
      {
        "topic": str,
        "seo_quality_scorecard": {
          "overall_verdict": "PASS"|"FAIL",
          "overall_score": float,
          "dimensions": [
            {"dimension": str, "score": int, "verdict": "PASS"|"FAIL", "notes": str}
          ],
          "revision_instructions": str
        }
      },
      
    ]
  agent: casino_content_seo_quality_checker
  async_execution: true
  context:
  - draft_casino_article
assemble_draft_package_for_review_queue:
  description: |-
    Assemble 1 complete draft Package for today's batch and prepare it for the review queue.

    Read the outputs from:
    - Draft {domain_title} Article task (1 draft)
    - Compliance Gate Check task (1 compliance scorecard)
    - SEO and Quality Gate Check task (1 SEO scorecard)

    Match each draft with its corresponding compliance and SEO scorecards by topic name. Then for EACH of the 1 topic, run the following checks and produce a complete Draft Package JSON.

    **FOR EACH OF THE 1 topic:**

    **COMPLETENESS PRE-CHECK — run before setting review_status:**
    Verify the draft contains ALL required fields with non-empty, non-placeholder values:
    - body_html (must not be truncated — {body_completeness_rule})
    - seo_title (present and non-empty)
    - meta_description (present and non-empty)
    - slug (present and non-empty)
    - featured_image_prompt (present and includes alt= attribute)

    If ANY field fails: review_status = "needs_heavier_review", escalation_reason = "Draft failed completeness pre-check: [list fields]". Stop here for this article.

    **FABRICATION CHECK — run after completeness pre-check:**
    Scan body_html for fake operator names: "{domain_title} A", "{domain_title} B", "Sweepstakes {domain_title} X", "Top Brand", "Example {domain_title}", or similar patterns with invented per-operator figures.

    If fabricated data found: review_status = "needs_heavier_review", escalation_reason = "Draft contains fabricated placeholder {domain_noun} names or invented per-operator data." Stop here for this article.

    **SET review_status — applies ONLY if both pre-checks pass:**
    review_status = "ready_for_review" if ALL true:
      1. compliance_scorecard.blocking_failures[] is empty
      2. seo_quality_scorecard.overall_verdict = "PASS"
      3. ALL individual SEO dimensions have verdict = "PASS"
      4. Completeness pre-check passed
      5. Fabrication check passed

    review_status = "needs_heavier_review" if ANY:
      - compliance_scorecard.blocking_failures[] is non-empty
      - seo_quality_scorecard.overall_verdict = "FAIL"
      - ANY individual SEO dimension verdict = "FAIL"
      - Either pre-check failed

    revision_count: {revision_count}
    escalation_reason: {escalation_reason}

    Generate a unique UUID for each package_id. Set created_at to current UTC ISO timestamp.
    Detect pillar from each topic: {pillar_list_spaced}.

    HARD STOP: This task NEVER publishes. NEVER writes to WordPress. Output is Draft Package JSON only.
  expected_output: |-
    A JSON object containing a batch of 1 Draft Package:
    {
      "batch_date": "YYYY-MM-DD",
      "total_packages": 1,
      "ready_for_review_count": int,
      "needs_review_count": int,
      "packages": [
        {
          "package_id": str,
          "topic": str,
          "primary_keyword": str,
          "pillar": {pillar_enum},
          "created_at": str,
          "revision_count": int,
          "review_status": "ready_for_review"|"needs_heavier_review",
          "escalation_reason": str|null,
          "draft": { /* full draft fields */ },
          "compliance_scorecard": { /* from Compliance Gate Check */ },
          "seo_quality_scorecard": { /* from SEO and Quality Gate Check */ },
          "verification_flags": [str],
          "reviewer_notes": str
        }
      ]
    }
  agent: casino_seo_research_grounding_specialist
  context:
  - draft_casino_article
  - compliance_gate_check
  - seo_and_quality_gate_check
